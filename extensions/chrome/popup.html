<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SellScope</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
        </svg>
        <span>SellScope</span>
      </div>
      <div class="status connected" id="status">
        <span class="status-dot"></span>
        Connected
      </div>
    </header>

    <main class="main">
      <section class="section">
        <h2>Quick Actions</h2>
        <div class="actions">
          <button class="action-btn" id="analyzeBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            Analyze Page
          </button>
          <button class="action-btn" id="keywordsBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20M2 12h20"/>
            </svg>
            Suggest Keywords
          </button>
          <button class="action-btn" id="briefBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            Generate Brief
          </button>
        </div>
      </section>

      <section class="section">
        <h2>Current Page</h2>
        <div id="pageInfo" class="page-info">
          <p class="loading">Detecting page type...</p>
        </div>
      </section>

      <section class="section">
        <h2>Opportunity Score</h2>
        <div id="opportunityScore" class="score-container">
          <div class="score-placeholder">
            Search or analyze a keyword to see its score
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <a href="#" id="openDashboard">Open Dashboard</a>
      <a href="#" id="openSettings">Settings</a>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
